<div class="window">
  <!-- Barre de titre -->
  <header
    class="window__header"
    [class.window__header--draggable]="floating()"
    (mousedown)="onHeaderMousedown($event)"
  >
    <div class="window__dots" [attr.aria-hidden]="!closable() ? 'true' : null">
      @if (closable()) {
        <button class="window__dot window__dot--close" (click)="onClose()" aria-label="Close window"></button>
      } @else {
        <span class="window__dot"></span>
      }
      <span class="window__dot"></span>
      <span class="window__dot"></span>
    </div>

    <span class="window__title">{{ title() }}</span>

    <!-- Miroir invisible pour centrer le titre optiquement -->
    <div class="window__dots window__dots--ghost" aria-hidden="true">
      <span class="window__dot"></span>
      <span class="window__dot"></span>
      <span class="window__dot"></span>
    </div>
  </header>

  <!-- Corps — contenu projeté via ng-content -->
  <div class="window__body">
    <ng-content />
  </div>
</div>
